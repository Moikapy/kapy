name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun test packages/kapy/test/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: kapy ${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGES }}

            ### Packages
            - `@moikapy/kapy@${{ steps.version.outputs.VERSION }}` — CLI framework
            - `@moikapy/kapy-components@${{ steps.version.outputs.VERSION }}` — TUI components

            ### Install
            ```bash
            bun add @moikapy/kapy
            # or globally
            bun add -g @moikapy/kapy
            ```

            ### Quick Start
            ```bash
            npx @moikapy/kapy init my-cli
            cd my-cli
            bun dev
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @moikapy/kapy-components to npm
        working-directory: packages/kapy-components
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ steps.version.outputs.VERSION }}" ]; then
            npm version --no-git-tag-version ${{ steps.version.outputs.VERSION }}
          fi
          npm publish --access public --tag ${{ contains(steps.version.outputs.VERSION, '-') && 'next' || 'latest' }}

      - name: Publish @moikapy/kapy to npm
        working-directory: packages/kapy
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ steps.version.outputs.VERSION }}" ]; then
            npm version --no-git-tag-version ${{ steps.version.outputs.VERSION }}
          fi
          npm publish --access public --tag ${{ contains(steps.version.outputs.VERSION, '-') && 'next' || 'latest' }}