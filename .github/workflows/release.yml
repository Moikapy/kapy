name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & typecheck
        run: |
          bun run lint
          bun run typecheck

      - name: Run tests
        run: bun test packages/kapy/test/ packages/create-kapy/test/

      - name: Build packages
        run: bun run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: kapy ${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGES }}

            ### Packages
            - `kapy@${{ steps.version.outputs.VERSION }}` — CLI framework
            - `kapy-components@${{ steps.version.outputs.VERSION }}` — TUI components
            - `create-kapy@${{ steps.version.outputs.VERSION }}` — Project scaffolding

            ### Install
            ```bash
            bun add -g kapy
            # or
            npm install -g kapy
            ```

            ### Quick Start
            ```bash
            bunx create-kapy my-cli
            cd my-cli
            bun dev
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish kapy-components to npm
        working-directory: packages/kapy-components
        run: |
          npm version --no-git-tag-version ${{ steps.version.outputs.VERSION }}
          npm publish --access public --tag ${{ contains(steps.version.outputs.VERSION, '-') && 'next' || 'latest' }}

      - name: Publish kapy to npm
        working-directory: packages/kapy
        run: |
          npm version --no-git-tag-version ${{ steps.version.outputs.VERSION }}
          npm publish --access public --tag ${{ contains(steps.version.outputs.VERSION, '-') && 'next' || 'latest' }}

      - name: Publish create-kapy to npm
        working-directory: packages/create-kapy
        run: |
          npm version --no-git-tag-version ${{ steps.version.outputs.VERSION }}
          npm publish --access public --tag ${{ contains(steps.version.outputs.VERSION, '-') && 'next' || 'latest' }}